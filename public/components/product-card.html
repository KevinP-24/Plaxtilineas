<div class="product-card">
  <div class="product-image-wrapper">
    <img src="{{imagen_url}}" alt="{{nombre_producto}}" class="product-image" />
    <span class="tag {{etiqueta_clase}}">{{etiqueta_texto}}</span>
  </div>
  <div class="product-info">
    <h4 class="product-name">{{nombre_producto}}</h4>
    <p class="product-price">{{unidad}} ${{precio}} </p>
    <button class="select-btn">Seleccionar opciones</button>
  </div>
</div>
