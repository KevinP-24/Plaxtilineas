  <link rel="stylesheet" href="/css/botoneSociales.css">

  <!-- Datos estructurados Schema.org -->

  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "PlaxtiLineas",
    "url": "https://plaxtilineas.com",
    "logo": "https://plaxtilineas.com/img/logo.png",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+57 3113416659",
      "contactType": "customer service"
    },
    "sameAs": [
      "https://www.facebook.com/plaxtilineas",
      "https://www.instagram.com/plaxtilineas/",
      "https://wa.me/1234567890"
    ]
  }

<body>


  <section class="asistente">
    <div class="main-container">
      <!-- Ventana tipo WhatsApp -->
      <div class="whatsapp-window">
        <div class="whatsapp-header">
          <img src="./img/logopesta.png" alt="Logo PlaxtiLineas">
          <div>
            <strong>PlaxtiLineas</strong><br>
            <small>Responde rápidamente</small>
          </div>
        </div>
        <div class="whatsapp-body">
          <div class="bubble assistant">
            ¡Hola! 👋<br>
            ¿En qué podemos ayudarte hoy?
          </div>
        </div>
        <a href="https://wa.me/+573006680125?text=Hola, necesito ayuda" target="_blank" class="whatsapp-button">
          Chatea en WhatsApp
        </a>
      </div>
      <!-- NUEVO: contenedor exclusivo para la imagen del asistente -->
      <div class="asistente-imagen-container">
        <img src="./img/ayuda.png" alt="Asistente" class="assistant-img">
      </div>  
    </div>
  </section>
  
  <!--Seccion donde se insertara el mapa-->
  <section class="contenidoM mapa">
    <h2 class="title">¡Recuerda Donde estamos Ubicados!</h2>
    <p class="map-subtitle">Visítanos en nuestra ubicación física en Armenia, Quindío.</p>
    <div class="map-container">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!4v1733971947234!6m8!1m7!1srsqHEySLHOzmaXYDg-wMgg!2m2!1d4.535668507113891!2d-75.67495696103823!3f150.42944478021346!4f-11.723004583918524!5f0.9750208071456414" 
        width="100%" 
        height="400" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <div class="map-buttons">
        <a href="https://www.google.com/maps/dir/?api=1&destination=Cra.19+%23+19-35+Armenia+Quindio" class="btn2">
            <span class="spn2">Abirir en Google Maps</span>
        </a>
    </div>
  </section>


  <!-- Scripts -->
  <script src="js/general/logicaNavBar.js"></script>
  <script src="js/general/cargarFooter.js"></script>
